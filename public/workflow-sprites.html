<meta charset="utf-8">
<title>Sprites — generation &amp; animation workflow, live</title>
<style>
  body { background: #17120e; color: #f2e4c4; font-family: "Iowan Old Style", Palatino, Georgia, serif; margin: 0; padding: 26px 26px 80px; }
  h1 { font-variant: small-caps; color: #e0a94e; margin: 0 0 2px; }
  .sub { font-style: italic; opacity: .7; margin-bottom: 8px; }
  .stage { margin: 38px 0 0; }
  .stage h2 { font-variant: small-caps; color: #e0a94e; margin: 0 0 4px; font-size: 20px; }
  .stage .note { font-style: italic; opacity: .85; margin: 0 0 10px; max-width: 1100px; line-height: 1.45; }
  #cfg { background: #241c14; border: 1px solid #9c7a4c; border-radius: 10px; padding: 12px 16px; font: 12.5px monospace; white-space: pre-wrap; color: #d9c9a3; max-width: 1100px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .card { background: #241c14; border: 1px solid #9c7a4c; border-radius: 10px; padding: 8px; text-align: center; }
  .card .cap { font-size: 12.5px; font-style: italic; margin-top: 5px; color: #d9c9a3; max-width: 300px; }
  .card canvas { display: block; border-radius: 6px; background: repeating-conic-gradient(#2a2118 0% 25%, #1a140e 0% 50%) 0 0/16px 16px; }
  .sheetcard canvas { max-width: 300px; width: 300px; height: auto; }
  .legend { font: 12px monospace; margin: 6px 0 12px; }
  .legend span { padding: 1px 8px; border-radius: 4px; margin-right: 8px; }
  .prompt { background: #241c14; border: 1px solid #9c7a4c; border-radius: 10px; padding: 10px 14px; font-size: 13.5px; font-style: italic; color: #d9c9a3; max-width: 1100px; margin: 8px 0; line-height: 1.5; }
</style>
<h1>Sprites — generation &amp; animation, live</h1>
<div class="sub">runs the game's real sprite code (sprites2.js) on the current sheets · refresh = latest state</div>
<div id="cfg"></div>
<div id="host"></div>

<script>
  function makeCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
</script>
<script src="js/sprites2.js"></script>
<script>
  const DIR_COLORS = { down: '#7fd4ff', up: '#9fe89f', left: '#ffb44a' };
  const TINTS = [
    ['none', null], ['forest #9fa8c9', '#9fa8c9'], ['entrance #d9b18c', '#d9b18c'],
    ['interior #f2c091', '#f2c091'], ['lane #b8b4c9', '#b8b4c9'],
    ['square festival #e2a97e', '#e2a97e'], ['hush gray #9aa3b5', '#9aa3b5'],
  ];

  document.getElementById('cfg').textContent =
    'PARAMETERS\n' +
    'chroma key: hard cut r-g>90 && b-g>60 · fringe despill r-g>50 && b-g>32 (soft alpha) · 1px feather\n' +
    'frame canvas: 160×230 (230×230 wide) · bottom-aligned · upscale cap 1.2×\n' +
    'animation: frame alternation 5.5 fps (when 2 frames exist) · bob |sin(11t)|·2.2%h · sway ±0.05 rad (front/back only)\n' +
    'runtime: direction hysteresis 1.25× axis dominance (main.js) · per-scene multiply tint, cached per (char, tint)';

  const stage = (title, note) => {
    const d = document.createElement('div'); d.className = 'stage';
    const h = document.createElement('h2'); h.textContent = title; d.appendChild(h);
    const p = document.createElement('div'); p.className = 'note'; p.textContent = note; d.appendChild(p);
    document.getElementById('host').appendChild(d);
    return d;
  };
  const card = (parent, cap) => {
    const c = document.createElement('div'); c.className = 'card';
    const el = document.createElement('div'); el.className = 'cap'; el.textContent = cap;
    parent.appendChild(c); c.appendChild(el);
    return c;
  };

  (async () => {
    // wait for every sheet to be sliced by the real pipeline
    let tries = 0;
    const names = Object.keys(SpriteDefs);
    while (tries++ < 60 && !names.every(n => Sprites.loaded[n])) await new Promise(r => setTimeout(r, 250));

    /* ---- 1 · generation ---- */
    const s1 = stage('1 · generation — one sheet per character',
      'Gemini paints each sheet on flat magenta from a strict grid prompt (4×4 walk-cycle grid for players, 2×2 idle grid for villagers), anchored to June\'s sheet as the style reference. The grids come back UNRELIABLE — misaligned cells, duplicated or wrong-facing frames — so a human (me) hand-picks the usable cells per direction. Highlighted cells below are the ones actually in the game.');
    const legend = document.createElement('div'); legend.className = 'legend';
    legend.innerHTML = Object.entries(DIR_COLORS).map(([d, c]) =>
      `<span style="background:${c};color:#111">${d}</span>`).join('') +
      '<span style="border:1px dashed #999">right = mirrored from left</span>';
    s1.appendChild(legend);
    const row1 = document.createElement('div'); row1.className = 'row'; s1.appendChild(row1);
    for (const [name, def] of Object.entries(SpriteDefs)) {
      const img = new Image(); img.src = def.src;
      await new Promise(r => { img.onload = r; img.onerror = r; });
      if (!img.naturalWidth) continue;
      const c = card(row1, name + ' · ' + (def.cell ? 'cell ' + def.cell + (def.cellH ? '×' + def.cellH : '') : 'pixel rects') +
        (def.sideFacesRight ? ' · side faces RIGHT' : ''));
      c.className += ' sheetcard';
      const cv = makeCanvas(img.width, img.height);
      const g = cv.getContext('2d');
      g.drawImage(img, 0, 0);
      g.lineWidth = Math.max(4, img.width / 120);
      for (const [dir, picks] of Object.entries(def.picks)) {
        g.strokeStyle = DIR_COLORS[dir];
        for (const p of picks) {
          if (Array.isArray(p)) {
            const CW = def.cell, CH = def.cellH || def.cell;
            g.strokeRect(p[0] * CW + 3, p[1] * CH + 3, CW - 6, CH - 6);
          } else g.strokeRect(p.x, p.y, p.w, p.h);
        }
      }
      c.insertBefore(cv, c.firstChild);
    }

    /* ---- 2 · slice + chroma key ---- */
    const s2 = stage('2 · slice, key, normalize',
      'Each picked cell is cropped, magenta-keyed (hard cut, then fringe despill with soft alpha, then a 1px feather), auto-cropped to content, and bottom-aligned into a uniform frame canvas. Left: raw crop from the sheet. Right: the frame the game uses.');
    const row2 = document.createElement('div'); row2.className = 'row'; s2.appendChild(row2);
    for (const name of ['june', 'cole']) {
      const def = SpriteDefs[name];
      const img = new Image(); img.src = def.src;
      await new Promise(r => { img.onload = r; img.onerror = r; });
      for (const [dir, picks] of Object.entries(def.picks)) {
        picks.forEach((p, i) => {
          const c = card(row2, name + ' · ' + dir + (picks.length > 1 ? ' f' + i : ''));
          const cv = makeCanvas(220, 160); const g = cv.getContext('2d');
          let sx, sy, cw, ch;
          if (Array.isArray(p)) { cw = def.cell; ch = def.cellH || def.cell; sx = p[0] * cw; sy = p[1] * ch; }
          else { sx = p.x; sy = p.y; cw = p.w; ch = p.h; }
          const sc = 150 / ch;
          g.drawImage(img, sx, sy, cw, ch, 5, 5, cw * sc, ch * sc);
          const fr = Sprites.frames[name][dir][i];
          const sc2 = 150 / fr.height;
          g.drawImage(fr, 115, 5, fr.width * sc2, fr.height * sc2);
          c.insertBefore(cv, c.firstChild);
        });
      }
    }

    /* ---- 3 · mirroring ---- */
    const s3 = stage('3 · side mirroring',
      'Sheets only contribute ONE usable side. The other side is a horizontal flip. June\'s picks face left (right = flipped); Cole\'s sheet\'s side cells face right, so the sideFacesRight flag flips the LEFT instead. Mirroring is invisible for these designs because nothing on them is left/right asymmetric.');
    const row3 = document.createElement('div'); row3.className = 'row'; s3.appendChild(row3);
    for (const name of ['june', 'cole']) {
      for (const dir of ['left', 'right']) {
        const c = card(row3, name + ' · ' + dir + ((SpriteDefs[name].sideFacesRight ? dir === 'left' : dir === 'right') ? ' (mirrored)' : ' (from sheet)'));
        const fr = Sprites.frames[name][dir][0];
        const cv = makeCanvas(110, 160);
        cv.getContext('2d').drawImage(fr, 5, 5, fr.width * (150 / fr.height), 150);
        c.insertBefore(cv, c.firstChild);
      }
    }

    /* ---- 4 · live animation ---- */
    const s4 = stage('4 · animation — live, exactly as in-game',
      'Real Sprites.draw calls. There are no true walk-cycle frames for front/back (the generated cycles were unusable duplicates) — walking is SOLD procedurally: a step-rate bob, a slight sway for front/back, and 2-frame alternation on the sides where the sheet gave two good strides. This is the main thing an improved workflow could upgrade.');
    const row4 = document.createElement('div'); row4.className = 'row'; s4.appendChild(row4);
    const anims = [];
    for (const name of ['june', 'cole', 'mochi']) {
      for (const dir of name === 'mochi' ? ['left', 'right'] : ['down', 'up', 'left', 'right']) {
        const c = card(row4, name + ' · walk ' + dir);
        const cv = makeCanvas(120, 170);
        c.insertBefore(cv, c.firstChild);
        anims.push({ g: cv.getContext('2d'), e: { char: name, x: 60, y: 158, dir, moving: true, animT: Math.random() * 9, h: name === 'mochi' ? 60 : 130, lightCarrier: name === 'cole' } });
      }
    }
    { // idle comparison
      const c = card(row4, 'june · idle (for contrast)');
      const cv = makeCanvas(120, 170);
      c.insertBefore(cv, c.firstChild);
      anims.push({ g: cv.getContext('2d'), e: { char: 'june', x: 60, y: 158, dir: 'down', moving: false, animT: 0, h: 130 } });
    }
    let last = performance.now();
    (function tick(now) {
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      for (const a of anims) {
        a.e.animT += dt;
        a.g.clearRect(0, 0, 120, 170);
        Sprites.draw(a.g, a.e, null);
      }
      requestAnimationFrame(tick);
    })(last);

    /* ---- 5 · scene tint grading ---- */
    const s5 = stage('5 · per-scene tint grading',
      'Sprites are generated once under neutral light, then multiplied by each scene\'s tint at draw time (cached per character+tint) so they sit in the scene\'s palette instead of floating on top of it.');
    const row5 = document.createElement('div'); row5.className = 'row'; s5.appendChild(row5);
    for (const [label, tint] of TINTS) {
      const c = card(row5, label);
      const set = tint ? Sprites.tintSet('june', tint) : Sprites.frames.june;
      const fr = set.down[0];
      const cv = makeCanvas(100, 160);
      cv.getContext('2d').drawImage(fr, 5, 5, fr.width * (150 / fr.height), 150);
      c.insertBefore(cv, c.firstChild);
    }

    /* ---- 6 · known limitations ---- */
    stage('6 · known limitations — where the workflow could improve',
      '(a) No real walk cycles: front/back are single frames + procedural bob; only the sides have 2 strides. (b) Hand-picking cells is manual, needed for every new sheet because grid prompts come back scrambled — there is no automated "sprite gate" that verifies frames the way navGate verifies masks. (c) Mirroring forbids left/right-asymmetric character designs (a satchel worn on one hip would flip sides). (d) No idle/emote animations. (e) Keying occasionally eats magenta-adjacent colors (pinks/purples).');

    window.__done = true;
  })();
</script>
