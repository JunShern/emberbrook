<meta charset="utf-8">
<title>June pixel sprite — pick a variant</title>
<style>
  body { background: #17120e; color: #f2e4c4; font-family: "Iowan Old Style", Palatino, Georgia, serif; margin: 0; padding: 26px 26px 80px; }
  h1 { font-variant: small-caps; color: #e0a94e; margin: 0 0 2px; }
  .sub { font-style: italic; opacity: .7; margin-bottom: 14px; max-width: 1100px; line-height: 1.5; }
  .prompt { background: #241c14; border: 1px solid #9c7a4c; border-radius: 10px; padding: 11px 14px; font-size: 12.5px; font-style: italic; line-height: 1.5; color: #d9c9a3; max-width: 1100px; margin-bottom: 20px; }
  .prompt .refline { margin-top: 8px; padding-top: 6px; border-top: 1px dashed #9c7a4c; font-style: normal; }
  .prompt .refline img { height: 54px; border-radius: 5px; border: 1px solid #9c7a4c; vertical-align: middle; margin-left: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(560px, 1fr)); gap: 18px; max-width: 1300px; }
  .cand { background: #241c14; border: 1px solid #9c7a4c; border-radius: 12px; padding: 12px; }
  .cand h2 { font-variant: small-caps; color: #e0a94e; margin: 0 0 8px; font-size: 18px; }
  .pair { display: flex; gap: 12px; align-items: flex-start; }
  .big canvas { width: 180px; border-radius: 8px; background: repeating-conic-gradient(#2a2118 0% 25%, #1a140e 0% 50%) 0 0/16px 16px; }
  .ctx canvas { width: 360px; height: 360px; border-radius: 8px; border: 1px solid #9c7a4c; }
  .cap { font-size: 11.5px; font-style: italic; opacity: .75; text-align: center; margin-top: 3px; }
</style>
<h1>June — pixel front-pose variants (style B · charH 125)</h1>
<div class="sub">same prompt, six rolls — pick the one that becomes the animation-sheet reference. Also cyclable in-game with <b>J</b> (K for keyboard, 2 for the square). Composites at charH 125, 2× game zoom.</div>
<div class="prompt" id="promptBox">
  <span id="ptxt"></span>
  <div class="refline">ref passed in: <code>assets/busts/june.png</code><img src="assets/busts/june.png"></div>
</div>
<div class="grid" id="grid"></div>
<script>
  const PROMPT = "Single video game character field sprite of this exact character (auburn side-braid, sea-teal traveler's coat, dusty-rose scarf, leather satchel strap), full body including feet, standing facing the viewer in a relaxed idle pose, arms naturally at her sides. The character is alone, centered, on a completely flat uniform bright magenta background (#FF00FF), no gradients, no shadow cast on the background, no text, no watermark, no border. Art style: high-detail HD-2D pixel art — fine pixel clusters, subtle dithering, soft warm rim light, like a lovingly remastered retro JRPG sprite, about 3 heads tall.";
  document.getElementById('ptxt').textContent = PROMPT;
  const VARIANTS = [
    ['b', 'B0 — the original pick'],
    ['b1', 'B1'], ['b2', 'B2'], ['b3', 'B3'], ['b4', 'B4'], ['b5', 'B5'],
  ];
  const load = (src) => new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; });
  function keyMagenta(img) {
    const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
    const g = c.getContext('2d'); g.drawImage(img, 0, 0);
    const d = g.getImageData(0, 0, c.width, c.height), px = d.data;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], gg = px[i + 1], b = px[i + 2];
      const rg = r - gg, bg = b - gg;
      if (rg > 90 && bg > 60) { px[i + 3] = 0; continue; }
      if (rg > 50 && bg > 32) {
        const t = Math.min(1, ((rg + bg) - 82) / 60);
        px[i + 3] = Math.round(255 * (1 - t * 0.85));
        px[i] = Math.round(gg + rg * 0.35); px[i + 2] = Math.round(gg + bg * 0.35);
      }
    }
    g.putImageData(d, 0, 0);
    let minX = c.width, minY = c.height, maxX = 0, maxY = 0;
    for (let y = 0; y < c.height; y += 2) for (let x = 0; x < c.width; x += 2)
      if (d.data[(y * c.width + x) * 4 + 3] > 16) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    const out = document.createElement('canvas');
    out.width = Math.max(1, maxX - minX); out.height = Math.max(1, maxY - minY);
    out.getContext('2d').drawImage(c, minX, minY, out.width, out.height, 0, 0, out.width, out.height);
    return out;
  }
  (async () => {
    const scene = await load('assets/sq-c2.png');
    for (const [id, label] of VARIANTS) {
      let img;
      try { img = await load('assets/pose-cand/june-' + id + '.png'); } catch (e) { continue; }
      const keyed = keyMagenta(img);
      const div = document.createElement('div'); div.className = 'cand';
      div.innerHTML = '<h2>' + label + '</h2><div class="pair">' +
        '<div class="big"><canvas></canvas><div class="cap">keyed</div></div>' +
        '<div class="ctx"><canvas></canvas><div class="cap">in the square · charH 125 · 2× zoom</div></div></div>';
      const big = div.querySelector('.big canvas');
      big.width = keyed.width; big.height = keyed.height;
      big.getContext('2d').drawImage(keyed, 0, 0);
      const cv = div.querySelector('.ctx canvas');
      cv.width = 640; cv.height = 640;
      const g = cv.getContext('2d');
      const cropW = 320, sx = 672, sy = 660;
      const cx = sx - cropW / 2, cy = sy - cropW * 0.72;
      g.setTransform(2, 0, 0, 2, 0, 0);
      g.drawImage(scene, cx, cy, cropW, cropW, 0, 0, cropW, cropW);
      const h = 125, w = h * (keyed.width / keyed.height);
      g.fillStyle = 'rgba(0,0,0,.3)';
      g.beginPath(); g.ellipse(sx - cx, sy - cy + 3, w * 0.3, h * 0.06, 0, 0, 7); g.fill();
      g.drawImage(keyed, sx - cx - w / 2, sy - cy - h, w, h);
      g.globalCompositeOperation = 'multiply';
      g.fillStyle = '#e2a97e'; g.globalAlpha = 0.25; g.fillRect(0, 0, cropW, cropW);
      g.globalCompositeOperation = 'source-over'; g.globalAlpha = 1;
      document.getElementById('grid').appendChild(div);
    }
    window.__done = true;
  })();
</script>
