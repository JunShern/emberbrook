<meta charset="utf-8">
<title>blockout — village square scene</title>
<style>body { background: #223; margin: 20px; } canvas { border: 1px solid #556; }</style>
<canvas id="c" width="1280" height="720"></canvas>
<script>
  // crude layout blockout for the Village Square scene (~1.7 viewports wide)
  const g = document.getElementById('c').getContext('2d');
  const rect = (x, y, w, h, col) => { g.fillStyle = col; g.fillRect(x, y, w, h); };
  const blob = (x, y, r, col) => { g.fillStyle = col; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill(); };

  rect(0, 0, 1280, 720, '#5d9c4a');                    // grass
  // forest rim
  for (let i = 0; i < 46; i++) {
    blob(30 + (i * 137) % 1240, (i * 89) % 2 === 0 ? 20 + (i * 53) % 60 : 660 + (i * 31) % 50, 34, '#3f7233');
  }
  for (let i = 0; i < 14; i++) { blob(24, 60 + i * 48, 34, '#3f7233'); blob(1256, 40 + i * 50, 34, '#3f7233'); }

  // plaza (large diamond-ish cobble area, center)
  g.fillStyle = '#cbb591';
  g.beginPath(); g.moveTo(640, 130); g.lineTo(960, 360); g.lineTo(640, 590); g.lineTo(320, 360); g.closePath(); g.fill();

  // roads (tan): south exit, west exit, north exit to the gate
  rect(600, 560, 80, 160, '#c9a76b');                  // south road → exit bottom
  rect(0, 330, 340, 60, '#c9a76b');                    // west lane → exit left
  rect(600, 0, 80, 170, '#c9a76b');                    // north road → exit top (to gate scene)

  // buildings: bakery NW (red roof), elder hall NE (dark slate roof), house SE (thatch)
  rect(330, 90, 200, 140, '#8a5a35'); rect(320, 70, 220, 60, '#b03a2e');    // bakery + red roof band
  rect(760, 80, 260, 160, '#8a5a35'); rect(750, 60, 280, 66, '#4a5568');    // elder hall + slate roof band
  rect(880, 470, 180, 120, '#8a5a35'); rect(870, 452, 200, 54, '#c9a03c');  // thatched house SE
  // doors (dark, facing the plaza)
  rect(415, 215, 30, 15, '#3a2415'); rect(870, 225, 34, 15, '#3a2415'); rect(950, 575, 30, 15, '#3a2415');

  // heartlight pedestal (center of plaza) — amber
  blob(640, 360, 26, '#8f8672'); blob(640, 352, 14, '#f0a83c');

  // market stalls (red/white) west + east of center
  rect(450, 300, 90, 50, '#c94a3a'); rect(455, 292, 80, 12, '#f2e8d0');
  rect(740, 420, 90, 50, '#c94a3a'); rect(745, 412, 80, 12, '#f2e8d0');

  // lamp posts (amber dots) at plaza corners + one on each road
  for (const [x, y] of [[520, 200], [790, 250], [470, 480], [800, 540], [640, 640], [120, 320], [640, 90]])
    blob(x, y, 9, '#f2c94a');

  // notice board + crates near west entrance
  rect(350, 400, 40, 18, '#96703d');
  rect(300, 430, 24, 24, '#a5783f'); rect(330, 440, 24, 24, '#a5783f');

  // save to server
  fetch('/dev/save', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ name: 'blockout-square.png', dataUrl: document.getElementById('c').toDataURL('image/png') }),
  }).then(r => r.json()).then(j => console.log('saved', j));
</script>
