<meta charset="utf-8">
<title>Emberbrook — scene mask pipeline, live</title>
<style>
  body { background: #17120e; color: #f2e4c4; font-family: "Iowan Old Style", Palatino, Georgia, serif; margin: 0; padding: 26px 26px 80px; }
  h1 { font-variant: small-caps; color: #e0a94e; margin: 0 0 2px; }
  .sub { font-style: italic; opacity: .7; margin-bottom: 12px; }
  #scenes { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  #scenes button { font: inherit; font-variant: small-caps; font-size: 16px; color: #f2e4c4; background: #241c14; border: 1px solid #9c7a4c; border-radius: 8px; padding: 5px 16px; cursor: pointer; }
  #scenes button.on { background: #e0a94e; color: #241c14; font-weight: bold; }
  #scenes label { font-style: italic; margin-left: 14px; cursor: pointer; user-select: none; }
  .stage { margin: 34px 0 0; }
  .stage h2 { font-variant: small-caps; color: #e0a94e; margin: 0 0 4px; font-size: 20px; }
  .stage .note { font-style: italic; opacity: .85; margin: 0 0 8px; max-width: 1100px; line-height: 1.45; }
  canvas, img { max-width: 1250px; width: 100%; border: 2px solid #9c7a4c; border-radius: 10px; display: block; background: #000; }
  #cfg { background: #241c14; border: 1px solid #9c7a4c; border-radius: 10px; padding: 12px 16px; font: 12.5px monospace; white-space: pre-wrap; color: #d9c9a3; max-width: 1100px; }
  .gate { margin-top: 8px; font: 13px monospace; color: #9fd49f; }
  .err { color: #ff8a7a; font: 14px monospace; margin-top: 20px; white-space: pre-wrap; }
</style>
<h1>Emberbrook scenes — mask pipeline, live</h1>
<div class="sub">every bake stage, re-computed from the current assets on each run · mirrors tools/bakemask.py (the production baker) · refresh = latest state</div>
<div id="scenes"></div>
<div id="cfg"></div>
<div id="stages"></div>
<script src="js/bake-core.js"></script>
<script>
  const SCENES = BakeCore.SCENES;   // square | forest | entrance | interior | lane | gate
  let curScene = 'square', curMin = false, runToken = 0;

  // ---- hash routing: #lane = full pipeline, #lane-min = threshold-only ----
  function parseHash() {
    const h = location.hash.replace(/^#/, '');
    if (!h) return;
    const min = /-min$/.test(h);
    const name = h.replace(/-min$/, '');
    if (SCENES.includes(name)) { curScene = name; curMin = min; }
  }
  function writeHash() {
    const want = '#' + curScene + (curMin ? '-min' : '');
    if (location.hash !== want) history.replaceState(null, '', want);
  }

  // ---- selector row ----
  const bar = document.getElementById('scenes');
  for (const s of SCENES) {
    const b = document.createElement('button');
    b.textContent = s; b.dataset.scene = s;
    b.onclick = () => { curScene = s; writeHash(); rerun(); };
    bar.appendChild(b);
  }
  const lab = document.createElement('label');
  const chk = document.createElement('input');
  chk.type = 'checkbox';
  chk.onchange = () => { curMin = chk.checked; writeHash(); rerun(); };
  lab.appendChild(chk);
  lab.appendChild(document.createTextNode(' threshold-only (skip close / heal / bay-fill / dilate / despeck / carve)'));
  bar.appendChild(lab);

  window.addEventListener('hashchange', () => { parseHash(); rerun(); });

  function syncBar() {
    for (const b of bar.querySelectorAll('button')) b.classList.toggle('on', b.dataset.scene === curScene);
    chk.checked = curMin;
  }

  // shipped production mask (baked by tools/bakemask.py) for the diff stage
  function loadShippedMask(name, W, H) {
    return BakeCore.load('assets/scenes/' + name + '/mask.png').then(img => {
      const c = document.createElement('canvas'); c.width = W; c.height = H;
      const g = c.getContext('2d'); g.drawImage(img, 0, 0, W, H);
      const d = g.getImageData(0, 0, W, H).data;
      const m = new Uint8Array(W * H);
      for (let i = 0; i < W * H; i++) m[i] = d[i * 4] > 127 ? 1 : 0;
      return m;
    }).catch(() => null);
  }

  async function rerun() {
    const token = ++runToken;
    syncBar();
    const { W, H, S } = BakeCore.CFG;
    const host = document.getElementById('stages');
    const cfgBox = document.getElementById('cfg');
    host.innerHTML = '';
    cfgBox.textContent = 'baking "' + curScene + '"' + (curMin ? ' (threshold-only)' : '') + ' …';

    let res, shipped;
    try {
      [res, shipped] = await Promise.all([
        BakeCore.run(true, curScene, { thresholdOnly: curMin }),
        loadShippedMask(curScene, W, H),
      ]);
    } catch (e) {
      if (token !== runToken) return;
      cfgBox.textContent = '';
      const d = document.createElement('div'); d.className = 'err';
      d.textContent = 'bake failed for "' + curScene + '": ' + (e && e.message || e);
      host.appendChild(d);
      return;
    }
    if (token !== runToken) return;   // a newer selection superseded this run

    // ---- params box: shared knobs + this scene's bake.json ----
    const C = BakeCore.CFG, J = res.cfg;
    const V = res.key === 'magenta' ? C.v2 : C.v1;
    const corridors = J.corridors || [], segments = J.segments || [], pois = J.pois || [], blocked = J.blockedRects || [];
    const fmtSlop = v => v == null ? 'n/a' : v.toFixed(1) + '%';
    cfgBox.textContent =
      'SCENE "' + curScene + '"' + (curMin ? '  ·  THRESHOLD-ONLY (morphology skipped)' : '  ·  MODE ' + res.mode + ' (flood key autodetected)') +
      '  ·  grid ' + W + '×' + H + ' @ ' + S + 'px cells\n' +
      (res.key === 'magenta'
        ? 'magenta threshold (loose): r-g>' + C.magenta.rgDiff + ' && b-g>' + C.magenta.bgDiff
        : 'green threshold (strict): g>' + C.green.min + ' && g>' + C.green.ratio + '×(r,b)') +
      (curMin ? '' : '      close r=' + V.closeR + '   despeck<' + C.speckMax + ' cells\n' +
        'bay-fill r=' + C.bayFillR + ' (seals pockets <' + (C.bayFillR * 2 * S) + 'px)   dilate=' + V.dilateR +
        '   edge-snap=' + (V.snap ? 'on (scan ' + C.snapScan + ' cells, added ' + res.snapped + ')' : 'off')) + '\n' +
      'SLOP METRIC (walkable cells on strong edges ≥p' + C.slopPct + ' sobel, T=' + res.edgeT + ', % of grid): ' +
      'shipped mask.png=' + fmtSlop(res.slopBefore) + '  →  this bake=' + fmtSlop(res.slopAfter) +
      '   ·   coverage ' + res.coverage.toFixed(1) + '%\n' +
      'bake.json · center: [' + (J.center || []).join(',') + ']   ·   corridors: ' + corridors.length +
      '   ·   segments: ' + segments.length +
      (segments.length ? ' (' + segments.map(s => s.label || '?').join(', ') + ')' :
        corridors.length ? ' · rects: (' + corridors.map(c => c.label || '?').join(', ') + ')' : '') + '\n' +
      'bake.json · POIs: ' + pois.length + '   ·   blockedRects: ' + blocked.length +
      '   ·   walk-behind: OFF by design (objects block wholesale)';

    for (const st of res.stages) {
      const div = document.createElement('div'); div.className = 'stage';
      const h = document.createElement('h2'); h.textContent = st.title; div.appendChild(h);
      const p = document.createElement('div'); p.className = 'note'; p.textContent = st.note; div.appendChild(p);
      const cv = document.createElement('canvas'); cv.width = 1344; cv.height = 768;
      const g = cv.getContext('2d');
      if (st.img) {
        g.drawImage(st.img, 0, 0, 1344, 768);
      } else if (st.m) {
        g.drawImage(res.scene, 0, 0, 1344, 768);
        g.fillStyle = 'rgba(60,230,90,.42)';
        for (let y = 0; y < H; y++) for (let x = 0; x < W; x++)
          if (st.m[y * W + x]) g.fillRect(x * S, y * S, S, S);
      }
      if (st.corridors) {
        g.strokeStyle = '#ffb44a'; g.lineWidth = 2; g.setLineDash([8, 5]);
        g.font = 'bold 15px monospace'; g.fillStyle = '#ffb44a';
        for (const r of st.corridors) { g.strokeRect(r.x, r.y, r.w, r.h); g.fillText(r.label || '', r.x + 6, Math.max(18, r.y + 18)); }
        g.setLineDash([]);
      }
      if (st.segments) {
        g.strokeStyle = '#4ad4ff'; g.fillStyle = '#4ad4ff'; g.font = 'bold 14px monospace';
        for (const s of st.segments) {
          g.lineWidth = 2; g.setLineDash([8, 5]);
          g.beginPath();
          s.pts.forEach(([px, py], i) => i ? g.lineTo(px, py) : g.moveTo(px, py));
          g.stroke(); g.setLineDash([]);
          for (const [px, py] of s.pts) { g.beginPath(); g.arc(px, py, 4, 0, 7); g.fill(); }
          const [lx, ly] = s.pts[0];
          g.fillText(s.label || '', lx + 8, Math.max(16, ly - 8));
        }
      }
      if (st.blockedRects) {
        g.strokeStyle = '#ff6a5a'; g.lineWidth = 2; g.setLineDash([4, 4]);
        g.font = 'bold 15px monospace'; g.fillStyle = '#ff6a5a';
        for (const r of st.blockedRects) { g.strokeRect(r.x, r.y, r.w, r.h); g.fillText('blocked', r.x + 6, Math.max(18, r.y + 18)); }
        g.setLineDash([]);
      }
      if (st.pois) {
        g.fillStyle = '#7fd4ff'; g.strokeStyle = 'rgba(0,20,40,.9)'; g.lineWidth = 2;
        for (const [px, py] of st.pois) { g.beginPath(); g.arc(px, py, 5, 0, 7); g.fill(); g.stroke(); }
        g.fillStyle = '#ff7f7f';
        for (const [px, py] of (st.carvedPaths || [])) { g.beginPath(); g.arc(px, py, 8, 0, 7); g.stroke(); g.fill(); }
      }
      div.appendChild(cv);
      host.appendChild(div);
    }

    // ---- diff vs the shipped python-baked mask.png (full pipeline only) ----
    if (!curMin) {
      const div = document.createElement('div'); div.className = 'stage';
      const h = document.createElement('h2'); h.textContent = '✓ · browser bake vs shipped mask.png'; div.appendChild(h);
      const p = document.createElement('div'); p.className = 'note'; div.appendChild(p);
      if (!shipped) {
        p.textContent = 'assets/scenes/' + curScene + '/mask.png could not be loaded — no comparison possible.';
      } else {
        let agree = 0, onlyBrowser = 0, onlyShipped = 0;
        for (let i = 0; i < W * H; i++) {
          if (res.m[i] === shipped[i]) agree++;
          else if (res.m[i]) onlyBrowser++; else onlyShipped++;
        }
        const pct = (agree * 100 / (W * H)).toFixed(2);
        p.textContent = 'agreement ' + pct + '% (' + agree + '/' + (W * H) + ' cells) · orange = walkable only in this browser bake (' +
          onlyBrowser + ') · magenta = walkable only in the shipped python bake (' + onlyShipped +
          '). Large divergence means this review page is NOT showing what actually shipped.';
        const cv = document.createElement('canvas'); cv.width = 1344; cv.height = 768;
        const g = cv.getContext('2d');
        g.drawImage(res.scene, 0, 0, 1344, 768);
        g.globalAlpha = 0.5; g.fillStyle = '#000'; g.fillRect(0, 0, 1344, 768); g.globalAlpha = 1;
        for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
          const i = y * W + x;
          if (res.m[i] === shipped[i]) { if (res.m[i]) { g.fillStyle = 'rgba(60,230,90,.30)'; g.fillRect(x * S, y * S, S, S); } }
          else { g.fillStyle = res.m[i] ? 'rgba(255,170,40,.95)' : 'rgba(255,60,220,.95)'; g.fillRect(x * S, y * S, S, S); }
        }
        div.appendChild(cv);
      }
      host.appendChild(div);
    }

    // ---- acceptance gate summary (recorded result exists for the square) ----
    if (!curMin) {
      const gate = document.createElement('div'); gate.className = 'stage';
      const gh = document.createElement('h2'); gh.textContent = 'acceptance — navigation gate'; gate.appendChild(gh);
      const gp = document.createElement('div'); gp.className = 'note';
      gp.textContent = 'The final test runs in the game itself (window.navGate): BFS pathfinding with clearance between every pair of gameplay positions, then the real movement code drives each route. Required: 0 failures, 0 assist warnings.';
      gate.appendChild(gp);
      if (curScene === 'square') {
        const gs = document.createElement('div'); gs.className = 'gate';
        gs.textContent = 'latest recorded result (square): 210/210 pairs · 0 failures · 0 warnings';
        gate.appendChild(gs);
      }
      host.appendChild(gate);
    }
    window.__done = true;
    window.__doneScene = curScene + (curMin ? '-min' : '');
  }

  parseHash();
  writeHash();
  rerun();
</script>
