<meta charset="utf-8">
<title>Square final — candidate C · mask · props</title>
<style>
  body { background: #17120e; color: #f2e4c4; font-family: "Iowan Old Style", Palatino, Georgia, serif; margin: 0; padding: 26px; }
  h1 { font-variant: small-caps; color: #e0a94e; margin: 0 0 4px; }
  h2 { font-variant: small-caps; color: #e0a94e; margin: 26px 0 8px; font-size: 19px; }
  .sub { font-style: italic; opacity: .7; }
  canvas, img { max-width: 1250px; width: 100%; border: 2px solid #9c7a4c; border-radius: 10px; display: block; }
  #props { display: flex; gap: 12px; flex-wrap: wrap; }
  #props .p { background: #274a2c; border: 1px solid #9c7a4c; border-radius: 8px; padding: 6px; text-align: center; font-size: 12px; font-style: italic; }
  #props canvas { width: auto; max-height: 170px; border: none; }
</style>
<h1>The Square — final pipeline on candidate C</h1>
<div class="sub">chosen scene → derived occupancy mask → walk-behind props isolated &amp; keyed</div>

<h2>1 · the scene (candidate C)</h2>
<img src="assets/sq-full-c.png">

<h2>2 · occupancy — green-fill derivation, thresholded + eroded (green = walkable)</h2>
<canvas id="maskViz" width="1344" height="768"></canvas>

<h2>3 · walk-behind props, isolated from the scene and chroma-keyed</h2>
<div id="props"></div>

<script>
  const load = (src) => new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; });
  function keyMagenta(img) {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    const g = c.getContext('2d');
    g.drawImage(img, 0, 0);
    const d = g.getImageData(0, 0, c.width, c.height), px = d.data;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], gg = px[i + 1], b = px[i + 2];
      const rg = r - gg, bg = b - gg;
      if (rg > 90 && bg > 60) { px[i + 3] = 0; continue; }
      if (rg > 50 && bg > 32) {
        const t = Math.min(1, ((rg + bg) - 82) / 60);
        px[i + 3] = Math.round(255 * (1 - t * 0.85));
        px[i] = Math.round(gg + rg * 0.35);
        px[i + 2] = Math.round(gg + bg * 0.35);
      }
    }
    g.putImageData(d, 0, 0);
    let minX = c.width, minY = c.height, maxX = 0, maxY = 0;
    for (let y = 0; y < c.height; y += 2) for (let x = 0; x < c.width; x += 2) {
      if (d.data[(y * c.width + x) * 4 + 3] > 16) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
    const out = document.createElement('canvas');
    out.width = Math.max(1, maxX - minX); out.height = Math.max(1, maxY - minY);
    out.getContext('2d').drawImage(c, minX, minY, out.width, out.height, 0, 0, out.width, out.height);
    return out;
  }
  (async () => {
    const scene = await load('assets/sq-full-c.png');
    try {
      const raw = await load('assets/sq-c-mask.png');
      const W = 336, H = 192, S = 4;
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const g0 = c.getContext('2d');
      g0.drawImage(raw, 0, 0, W, H);
      const d = g0.getImageData(0, 0, W, H).data;
      let m = new Uint8Array(W * H);
      for (let i = 0; i < W * H; i++) {
        const r = d[i * 4], gg = d[i * 4 + 1], b = d[i * 4 + 2];
        m[i] = (gg > 90 && gg > r * 1.25 && gg > b * 1.25) ? 1 : 0;
      }
      const pass = (src, hit, r) => {
        const out = new Uint8Array(W * H);
        for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
          let v = !hit;
          for (let dy = -r; dy <= r && v !== hit; dy++) for (let dx = -r; dx <= r; dx++) {
            const nx = x + dx, ny = y + dy;
            if (nx >= 0 && ny >= 0 && nx < W && ny < H && src[ny * W + nx] === (hit ? 1 : 0)) { v = hit; break; }
          }
          out[y * W + x] = v ? 1 : 0;
        }
        return out;
      };
      m = pass(m, true, 2); m = pass(m, false, 2); m = pass(m, false, 3);
      const mv = document.getElementById('maskViz');
      const g = mv.getContext('2d');
      g.drawImage(scene, 0, 0, 1344, 768);
      g.fillStyle = 'rgba(60,230,90,.4)';
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++)
        if (m[y * W + x]) g.fillRect(x * S, y * S, S, S);
    } catch (e) { console.warn('mask pending'); }
    const names = ['pedestal', 'stall-baker', 'stall-sausage', 'stall-right', 'stall-bgreen', 'stall-blue', 'lamp', 'lamp2', 'hay', 'cart', 'board'];
    for (const n of names) {
      try {
        const img = await load('assets/c-prop-' + n + '.png');
        const keyed = keyMagenta(img);
        const div = document.createElement('div');
        div.className = 'p';
        const cv = document.createElement('canvas');
        const s = 160 / keyed.height;
        cv.width = Math.max(1, keyed.width * s); cv.height = 160;
        cv.getContext('2d').drawImage(keyed, 0, 0, cv.width, cv.height);
        div.appendChild(cv);
        const cap = document.createElement('div'); cap.textContent = n;
        div.appendChild(cap);
        document.getElementById('props').appendChild(div);
      } catch (e) { console.warn('prop pending', n); }
    }
  })();
</script>
