<meta charset="utf-8">
<title>sprite sheet slicer test</title>
<style>
  body { background: #2a3a28; color: #f2e4c4; font: 13px monospace; padding: 24px; }
  .strip { display: flex; gap: 30px; align-items: flex-end; margin: 18px 0 30px; }
  canvas { image-rendering: auto; }
  .label { margin-top: 6px; opacity: .8; }
  #world { background: url('assets/painted-map2.png'); background-position: -420px -230px; background-size: 1184px;
           width: 500px; height: 200px; border-radius: 10px; position: relative; }
  #world canvas { position: absolute; }
</style>
<h2>June — generated sprite sheet, sliced + keyed + animated</h2>
<div class="strip" id="big"></div>
<h2>at approximate in-game scale, over the painted map</h2>
<div id="world"></div>
<script>
  const CELL = 256;
  // hand-picked cells [col,row] from the generated 4×4 sheet
  const PICKS = {
    down:  [[0, 0], [0, 1], [0, 2], [0, 3]],
    up:    [[1, 0], [2, 0], [2, 1], [3, 1]],
    left:  [[1, 2], [2, 2], [1, 3], [2, 2]],
  };
  const img = new Image();
  img.src = 'assets/sprite-june-test.png';
  img.onload = () => {
    const frames = {};   // dir -> [canvas]
    for (const [dir, cells] of Object.entries(PICKS)) {
      frames[dir] = cells.map(([cx, cy]) => keyCell(cx, cy));
    }
    // right = mirrored left
    frames.right = frames.left.map(c => {
      const m = document.createElement('canvas');
      m.width = c.width; m.height = c.height;
      const g = m.getContext('2d');
      g.translate(c.width, 0); g.scale(-1, 1); g.drawImage(c, 0, 0);
      return m;
    });

    for (const dir of ['down', 'up', 'left', 'right']) {
      addAnim(document.getElementById('big'), frames[dir], 140, dir);
      addAnim(document.getElementById('world'), frames[dir], 34, '', 40 + ['down','up','left','right'].indexOf(dir) * 120, 80);
    }
  };

  function keyCell(cx, cy) {
    const c = document.createElement('canvas');
    c.width = CELL; c.height = CELL;
    const g = c.getContext('2d');
    g.drawImage(img, cx * CELL, cy * CELL, CELL, CELL, 0, 0, CELL, CELL);
    const d = g.getImageData(0, 0, CELL, CELL);
    const px = d.data;
    let minX = CELL, minY = CELL, maxX = 0, maxY = 0;
    for (let i = 0; i < px.length; i += 4) {
      const r = px[i], gg = px[i + 1], b = px[i + 2];
      // key out magenta (and its softened fringe)
      if (r > 170 && b > 100 && gg < 110 && r - gg > 90) { px[i + 3] = 0; continue; }
      const x = (i / 4) % CELL, y = Math.floor(i / 4 / CELL);
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
    g.putImageData(d, 0, 0);
    // trim to bounding box, bottom-centered in a uniform frame
    const w = maxX - minX + 1, h = maxY - minY + 1;
    const out = document.createElement('canvas');
    out.width = 160; out.height = 230;
    out.getContext('2d').drawImage(c, minX, minY, w, h, (160 - w) / 2, 230 - h, w, h);
    return out;
  }

  function addAnim(parent, fr, height, label, absX, absY) {
    const wrap = document.createElement('div');
    const c = document.createElement('canvas');
    const scale = height / 230;
    c.width = 160 * scale; c.height = height;
    if (absX !== undefined) { c.style.left = absX + 'px'; c.style.top = absY + 'px'; parent.appendChild(c); }
    else {
      wrap.appendChild(c);
      const lab = document.createElement('div');
      lab.className = 'label'; lab.textContent = label;
      wrap.appendChild(lab);
      parent.appendChild(wrap);
    }
    const g = c.getContext('2d');
    let f = 0;
    setInterval(() => {
      g.clearRect(0, 0, c.width, c.height);
      g.drawImage(fr[f % fr.length], 0, 0, c.width, c.height);
      f++;
    }, 180);
  }
</script>
