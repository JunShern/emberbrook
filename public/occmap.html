<meta charset="utf-8">
<title>occupancy map — square stage</title>
<style>body { background: #223; margin: 20px; } canvas { border: 1px solid #556; width: 660px; }</style>
<canvas id="c" width="1344" height="768"></canvas>
<script>
  // SEMANTIC OCCUPANCY MAP — the source of truth for the square's geometry.
  // tan = dirt road · light warm gray = cobbled plaza · green = open grass
  // dark green = impassable forest. Walkable = plaza + roads + grass.
  const g = document.getElementById('c').getContext('2d');

  g.fillStyle = '#1e3a1c';                        // impassable forest base
  g.fillRect(0, 0, 1344, 768);

  // open grass apron (walkable)
  g.fillStyle = '#4e8a3a';
  g.beginPath(); g.ellipse(672, 400, 560, 330, 0, 0, 7); g.fill();

  // cobbled plaza — big rounded diamond (walkable)
  g.fillStyle = '#b8a88e';
  g.beginPath();
  g.moveTo(672, 130); g.quadraticCurveTo(1010, 200, 1120, 400);
  g.quadraticCurveTo(1010, 610, 672, 680);
  g.quadraticCurveTo(330, 610, 224, 400);
  g.quadraticCurveTo(330, 200, 672, 130);
  g.closePath(); g.fill();

  // dirt roads N / S / W / E (walkable)
  g.fillStyle = '#c9a26b';
  g.fillRect(600, 0, 144, 200);       // north road
  g.fillRect(600, 620, 144, 148);     // south road
  g.fillRect(0, 330, 300, 140);       // west road
  g.fillRect(1050, 330, 294, 140);    // east road

  fetch('/dev/save', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ name: 'occ-square.png', dataUrl: document.getElementById('c').toDataURL('image/png') }),
  }).then(r => r.json()).then(j => console.log('saved', j));
</script>
