<meta charset="utf-8">
<title>bake — square mask</title>
<style>body { background: #223; color: #cfc; font: 13px monospace; padding: 16px; } canvas { border: 1px solid #575; display: block; margin-top: 10px; max-width: 1250px; width: 100%; }</style>
<div id="log">processing…</div>
<canvas id="viz" width="1344" height="768"></canvas>
<script src="js/bake-core.js"></script>
<script>
  (async () => {
    const { m, carved, scene } = await BakeCore.run(false);
    const { W, H, S } = BakeCore.CFG;
    // save baked walkability bitmap
    const out = document.createElement('canvas'); out.width = W; out.height = H;
    const og = out.getContext('2d');
    const od = og.createImageData(W, H);
    for (let i = 0; i < W * H; i++) {
      const v = m[i] ? 255 : 0;
      od.data[i * 4] = v; od.data[i * 4 + 1] = v; od.data[i * 4 + 2] = v; od.data[i * 4 + 3] = 255;
    }
    og.putImageData(od, 0, 0);
    await fetch('/dev/save', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ name: 'sq-c2-mask.png', dataUrl: out.toDataURL('image/png') }),
    });
    // viz
    const vz = document.getElementById('viz').getContext('2d');
    vz.drawImage(scene, 0, 0, 1344, 768);
    vz.fillStyle = 'rgba(60,230,90,.4)';
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++)
      if (m[y * W + x]) vz.fillRect(x * S, y * S, S, S);
    document.getElementById('log').textContent = 'saved sq-c2-mask.png · carved: ' + carved;
    window.__done = { carved };
  })();
</script>
